<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Suppress benign Vite websocket errors in the preview environment
      (function() {
        const suppress = (msg) => 
          msg && (msg.includes('WebSocket') || msg.includes('vite') || msg.includes('HMR'));
        
        window.addEventListener('unhandledrejection', (event) => {
          if (event.reason && (
            (event.reason.message && suppress(event.reason.message)) ||
            (typeof event.reason === 'string' && suppress(event.reason))
          )) {
            event.preventDefault();
          }
        });

        const originalError = console.error;
        console.error = function(...args) {
          if (args[0] && typeof args[0] === 'string' && suppress(args[0])) return;
          originalError.apply(console, args);
        };

        const originalWarn = console.warn;
        console.warn = function(...args) {
          if (args[0] && typeof args[0] === 'string' && suppress(args[0])) return;
          originalWarn.apply(console, args);
        };
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
